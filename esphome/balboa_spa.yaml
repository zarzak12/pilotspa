# ═══════════════════════════════════════════════════════════════
#  ESPHome — Balboa Spa Controller
#  Board : ESP32
#  Pins  : Clock=23  Display=22  Button=13
# ═══════════════════════════════════════════════════════════════

esphome:
  name: balboa-spa
  friendly_name: Spa Balboa

esp32:
  board: esp32dev
  framework:
    type: arduino
    advanced:
          minimum_chip_revision: "3.0"
          sram1_as_iram: true
          
    
# ─── Wi-Fi ──────────────────────────────────────────────────────
wifi:
  ssid: !secret wifi_ext_ssid
  password: !secret wifi_password
  power_save_mode: none
  # Portail captif automatique si la connexion échoue
  ap:
    ssid: "OpenSpa-Config"
    password: "Théka1328"

captive_portal:

# ─── Logs ───────────────────────────────────────────────────────
logger:
  level: DEBUG

# ─── Time ───────────────────────────────────────────────────────
time:
  - platform: sntp
    id: esp_time
    timezone: Europe/Paris

# ─── API Home Assistant (remplace MQTT) ─────────────────────────
api:
  encryption:
    key: "xhNokhQNOEOevS1DoRK6ha06pEad1dzzOCNfeev5gzo="

# ─── OTA ────────────────────────────────────────────────────────
ota:
  - platform: esphome
    password: "Théka1328"
    
# ─── Composant externe (dossier local ./components) ─────────────
external_components:
  - source:
      type: local
      path: components      # chemin relatif au YAML
    components: [balboa_spa]

# ═══════════════════════════════════════════════════════════════
#  COMPOSANT BALBOA — déclaration principale
# ═══════════════════════════════════════════════════════════════
balboa_spa:
  id: balboa
  clock_pin: 23
  data_pin: 22
  button_pin: 13
      
# ═══════════════════════════════════════════════════════════════
#  SENSORS
# ═══════════════════════════════════════════════════════════════
sensor:
  - platform: balboa_spa
    water_temperature:
      name: "Spa Température Eau"
      id: water_temp
      icon: mdi:thermometer-water
    set_temperature:
      name: "Spa Température Consigne"
      id: set_temp
      icon: mdi:thermometer-chevron-up
 
  - platform: wifi_signal
    name: "Spa WiFi Signal"
    update_interval: 60s
 
# ═══════════════════════════════════════════════════════════════
#  TEXT SENSORS
# ═══════════════════════════════════════════════════════════════
text_sensor:
  - platform: balboa_spa
    lcd_display:
      name: "Spa LCD Display"
      icon: mdi:monitor-small
    mode:
      name: "Spa Mode"
      icon: mdi:cog   
    time:
      name: "Spa Heure"
      icon: mdi:clock-outline
    filter1_start:
      name: "Spa Filtre 1 Début"
      icon: mdi:clock-start
    filter1_stop:
      name: "Spa Filtre 1 Fin"
      icon: mdi:clock-end
    filter2_start:
      name: "Spa Filtre 2 Début"
      icon: mdi:clock-start
    filter2_stop:
      name: "Spa Filtre 2 Fin"
      icon: mdi:clock-end

  - platform: wifi_info
    ip_address:
      name: "Spa IP Address"
      icon: mdi:network-outline
 
# ═══════════════════════════════════════════════════════════════
#  BINARY SENSORS
# ═══════════════════════════════════════════════════════════════
binary_sensor:
  - platform: balboa_spa
    heater:
      name: "Spa Chauffe"
      icon: mdi:fire
    pump1:
      name: "Spa Pompe Brassage"
      icon: mdi:pump
    pump2:
      name: "Spa Pompe 2"
      icon: mdi:pump
    blower:
      name: "Spa Souffleur"
      icon: mdi:weather-windy
    light:
      name: "Spa Lumière"
      icon: mdi:lightbulb
    filtration:
      name: "Spa Filtration"
      icon: mdi:air-filter
    filter1:
      name: "Spa Filtre 1"
      icon: mdi:filter-outline
    filter2:
      name: "Spa Filtre 2"
      icon: mdi:filter-outline
    am:
      name: "Spa AM"
      icon: mdi:clock-time-four-outline
    pm:
      name: "Spa PM"
      icon: mdi:clock-time-eight-outline
    filter_start:
      name: "Spa Filtration Start"
      icon: mdi:play-circle-outline
    filter_stop:
      name: "Spa Filtration Stop"
      icon: mdi:stop-circle-outline
    set_time:
      name: "Spa Réglage Heure"
      icon: mdi:clock-edit-outline
    set_filter:
      name: "Spa Réglage Filtre"
      icon: mdi:filter-cog-outline

  - platform: status
    name: "Spa Statut"
 
# ═══════════════════════════════════════════════════════════════
#  BOUTONS DE COMMANDE
# ═══════════════════════════════════════════════════════════════
button:
  - platform: template
    name: "Spa Température +"
    icon: mdi:thermometer-plus
    on_press:
      lambda: 'id(balboa).press_temp_up();'
 
  - platform: template
    name: "Spa Température -"
    icon: mdi:thermometer-minus
    on_press:
      lambda: 'id(balboa).press_temp_down();'
 
  - platform: template
    name: "Spa Pompe Brassage"
    icon: mdi:pump
    on_press:
      lambda: 'id(balboa).press_pump1();'
 
  - platform: template
    name: "Spa Pompe 2"
    icon: mdi:pump
    on_press:
      lambda: 'id(balboa).press_pump2();'
 
  - platform: template
    name: "Spa Souffleur"
    icon: mdi:weather-windy
    on_press:
      lambda: 'id(balboa).press_blower();'
 
  - platform: template
    name: "Spa Lumière"
    icon: mdi:lightbulb
    on_press:
      lambda: 'id(balboa).press_light();'
 
  - platform: template
    name: "Spa Mode"
    icon: mdi:cog-refresh
    on_press:
      lambda: 'id(balboa).press_mode();'
  
  - platform: template
    name: "Spa Time"
    icon: mdi:clock-outline
    on_press:
      lambda: |-
        id(balboa).press_time();
        
  - platform: template
    name: "Spa Lire Heures Filtre"
    icon: mdi:clock-outline
    on_press:
      lambda: 'id(balboa).read_filter_times();'

  - platform: template
    name: "Spa Set Heures"
    icon: mdi:timer-cog-outline
    on_press:
      lambda: 'id(balboa).press_set_times();'
  
  - platform: template
    name: "Spa Synchro Heures"
    icon: mdi:timer-cog-outline
    on_press:
      lambda: 'id(balboa).sync_time();'
 
  - platform: restart
    name: "Spa Redémarrer"
    icon: mdi:restart

# ═══════════════════════════════════════════════════════════════
#  CLIMATE — Thermostat Balboa custom (bidirectionnel)
#  - current_temperature = température eau réelle du spa
#  - target_temperature  = consigne lue ET écrite sur le spa
# ═══════════════════════════════════════════════════════════════
climate:
  - platform: balboa_spa
    name: "Spa Thermostat"
    id: spa_thermostat
    balboa_id: balboa
